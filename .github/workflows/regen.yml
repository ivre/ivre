# Regenerates the trees that ship as generated artefacts and fails if
# the result differs from what is committed. AGENTS.md states that
# generated trees (web/static/doc/, web/static/ui/) must be
# regenerated and committed in the same change as their source; this
# workflow enforces it.

name: Regenerated trees in sync

on: [push, pull_request]

# https://docs.github.com/en/actions/writing-workflows/choosing-what-your-workflow-does/control-the-concurrency-of-workflows-and-jobs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !contains(github.ref, 'master') }}

jobs:
  docs:
    name: web/static/doc/ matches doc/
    runs-on: ubuntu-24.04
    steps:
      - name: Git checkout
        uses: actions/checkout@v4

      - name: Use Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install graphviz
        # ``sphinx.ext.graphviz`` (enabled in ``doc/conf.py``) shells
        # out to ``dot`` to render the ``.. graphviz::`` blocks under
        # ``doc/overview/principles.rst``. Without it the rendered
        # HTML differs and the diff check below fails.
        run: |
          sudo apt-get -q update
          sudo apt-get -qy install graphviz

      - name: Install IVRE with doc extras
        run: pip install -e '.[doc]'

      - name: Run pkg/builddocs
        run: ./pkg/builddocs

      - name: Verify web/static/doc/ is in sync
        # If any file under web/static/doc/ changed, the doc tree was
        # not regenerated alongside its source. The diff is shown so
        # the offending paths are visible in the failed run logs.
        #
        # PNG and PNG-imagemap (``.map``) files generated by
        # ``sphinx.ext.graphviz`` are excluded: ``dot`` produces
        # rasterized output that varies slightly across graphviz
        # versions for the same source. We don't lose drift detection
        # — Sphinx names the PNGs by a hash of the ``.. graphviz::``
        # source, so any real source change flips the filename and
        # surfaces in the surrounding HTML diff.
        run: |
          diff_files=$(git diff --name-only -- web/static/doc/ \
              | grep -vE '\.png(\.map)?$' || true)
          if [ -n "$diff_files" ]; then
              echo "::error::web/static/doc/ is out of sync with doc/. Run ./pkg/builddocs and commit the result in the same change as the source edit."
              echo "Files differing (PNG/PNG.map excluded):"
              echo "$diff_files"
              exit 1
          fi
          echo "web/static/doc/ matches doc/."

  web-ui:
    name: web/static/ui/ matches web-ui/
    runs-on: ubuntu-24.04
    steps:
      - name: Git checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Use Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: web-ui/pnpm-lock.yaml

      - name: Run pkg/buildwebui
        run: ./pkg/buildwebui

      - name: Verify web/static/ui/ is in sync
        # If any file under web/static/ui/ changed, the bundle was
        # not regenerated alongside its source.
        run: |
          if ! git diff --quiet -- web/static/ui/; then
              echo "::error::web/static/ui/ is out of sync with web-ui/. Run ./pkg/buildwebui and commit the result in the same change as the source edit."
              git diff --stat -- web/static/ui/
              exit 1
          fi
          echo "web/static/ui/ matches web-ui/."
