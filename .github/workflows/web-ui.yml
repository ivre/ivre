# Lints, type-checks, unit-tests, builds, and runs the Playwright
# smoke test against the React workspace under web-ui/. Independent
# from the Python CI matrix.

name: Web UI

on:
  push:
    paths:
      - "web-ui/**"
      - ".github/workflows/web-ui.yml"
  pull_request:
    paths:
      - "web-ui/**"
      - ".github/workflows/web-ui.yml"

# https://docs.github.com/en/actions/writing-workflows/choosing-what-your-workflow-does/control-the-concurrency-of-workflows-and-jobs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !contains(github.ref, 'master') }}

defaults:
  run:
    working-directory: web-ui

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        node-version: ["20", "22", "24"]

    steps:
      - name: Git checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Use Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
          cache-dependency-path: web-ui/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type-check
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Verify the bundle is self-contained
        # The deployed bundle under web/static/ui/ must make no
        # external HTTP requests at runtime. This step greps the
        # built dist/ tree (excluding source maps, which contain
        # build-time references that are not fetched by the runtime)
        # and fails if any URL outside the allowed set appears.
        #
        # Allowed (all are passive string literals — namespace URIs,
        # license attributions, or error-/doc-reference URLs in
        # console output, never reached over the network):
        #
        #   XML / SVG / RDF namespaces:
        #     - www.w3.org/...         XML, SVG, XHTML
        #     - purl.org/dc/...        Dublin Core (in world-map.svg)
        #     - web.resource.org/cc/   Creative Commons RDF
        #     - sodipodi.sourceforge.net/    Inkscape SVG metadata
        #     - inkscape.org/namespaces/     Inkscape SVG metadata
        #
        #   Library license / attribution / error references:
        #     - react.dev/errors/      React minified error lookup
        #     - tailwindcss.com        Tailwind CSS license header
        #     - radix-ui.com/...       Radix primitive doc URLs
        #     - reactrouter.com/...    react-router doc URLs
        #     - github.com/ungap/...   url-search-params polyfill comment
        #
        #   Dev-only:
        #     - localhost*             dev server / proxy targets
        run: |
          set -e
          found=$(find dist/ -type f -not -name '*.map' -print0 \
              | xargs -0 grep -hoE 'https?://[A-Za-z0-9._/?=&%~+:#@-]+' 2>/dev/null \
              | grep -vE '^https?://www\.w3\.org/' \
              | grep -vE '^https?://purl\.org/dc/' \
              | grep -vE '^https?://web\.resource\.org/cc/' \
              | grep -vE '^https?://sodipodi\.sourceforge\.net/' \
              | grep -vE '^https?://(www\.)?inkscape\.org/namespaces/' \
              | grep -vE '^https?://localhost([:/]|$)' \
              | grep -vE '^https?://react\.dev/errors/' \
              | grep -vE '^https?://tailwindcss\.com($|/| )' \
              | grep -vE '^https?://radix-ui\.com/' \
              | grep -vE '^https?://reactrouter\.com/' \
              | grep -vE '^https?://github\.com/ungap/' \
              | sort -u || true)
          if [ -n "$found" ]; then
              echo "External URLs leaked into the bundle:" >&2
              echo "$found" >&2
              exit 1
          fi
          echo "Bundle is self-contained."

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
        if: matrix.node-version == '22'

      - name: End-to-end smoke test
        run: pnpm test:e2e
        if: matrix.node-version == '22'

      - name: Upload Playwright report
        if: failure() && matrix.node-version == '22'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web-ui/playwright-report/
          retention-days: 7
