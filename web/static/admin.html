<html ng-app="ivreWebUi">
<head>
  <meta charset="utf-8">
  <title>IVRE - Admin</title>
  <link rel="icon" href="favicon.png" type="image/png">
  <link rel="stylesheet" href="bs/css/bootstrap.css">
  <link rel="stylesheet" href="ivre/ivre.css">
  <script src="jq/jquery.js"></script>
  <script src="bs/js/bootstrap.js"></script>
  <script src="an/js/angular.js"></script>
  <script>var config = {};</script>
  <script src="cgi/config"></script>
  <script src="ivre/ivre.js"></script>
  <script src="ivre/form-helpers.js"></script>
  <script src="ivre/controllers.js"></script>
  <style>
    body { padding-top: 60px; }
    .badge-active { background-color: #5cb85c; }
    .badge-pending { background-color: #f0ad4e; }
    .badge-inactive { background-color: #d9534f; }
    .badge-admin { background-color: #337ab7; }
  </style>
</head>
<body ng-controller="IvreAdminCtrl">
  <nav class="navbar navbar-inverse navbar-fixed-top">
    <div class="container-fluid">
      <div class="navbar-header">
        <a class="navbar-brand" href="index.html">
          <img alt="Logo" src="logo.png" style="height: 20px; display: inline;"> IVRE Admin
        </a>
      </div>
      <ul class="nav navbar-nav navbar-right">
        <li><a href="index.html"><i class="glyphicon glyphicon-arrow-left"></i> Back to IVRE</a></li>
      </ul>
    </div>
  </nav>

  <div class="container">
    <div ng-if="error_msg" class="alert alert-danger">{{error_msg}}</div>
    <div ng-if="ready">

      <h3>Users
        <button class="btn btn-sm btn-success" ng-click="show_add_user = true">
          <i class="glyphicon glyphicon-plus"></i> Add user
        </button>
      </h3>

      <div ng-if="show_add_user" class="well">
        <form class="form-inline" ng-submit="add_user()">
          <div class="form-group">
            <input type="email" class="form-control" ng-model="new_user.email" placeholder="Email" required>
          </div>
          <div class="form-group">
            <input type="text" class="form-control" ng-model="new_user.groups" placeholder="Groups (comma-separated)">
          </div>
          <div class="checkbox" style="margin-left: 10px;">
            <label><input type="checkbox" ng-model="new_user.is_admin"> Admin</label>
          </div>
          <button type="submit" class="btn btn-primary" style="margin-left: 10px;">Create</button>
          <button type="button" class="btn btn-default" ng-click="show_add_user = false">Cancel</button>
        </form>
      </div>

      <table class="table table-striped table-hover">
        <thead>
          <tr>
            <th>Email</th>
            <th>Display name</th>
            <th>Status</th>
            <th>Groups</th>
            <th>Last login</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr ng-repeat="u in users">
            <td>{{u.email}}</td>
            <td>{{u.display_name}}</td>
            <td>
              <span class="badge" ng-class="u.is_active ? 'badge-active' : 'badge-pending'">{{u.is_active ? 'active' : 'pending'}}</span>
              <span ng-if="u.is_admin" class="badge badge-admin">admin</span>
            </td>
            <td>
              <span ng-repeat="g in u.groups" class="label label-default" style="margin-right: 4px;">
                {{g}} <a href="" ng-click="remove_group(u.email, g)" style="color:#fff">&times;</a>
              </span>
            </td>
            <td>{{u.last_login ? (u.last_login | date:'short') : 'Never'}}</td>
            <td>
              <button ng-if="!u.is_active" class="btn btn-xs btn-success" ng-click="set_active(u.email, true)">Activate</button>
              <button ng-if="u.is_active" class="btn btn-xs btn-warning" ng-click="set_active(u.email, false)">Deactivate</button>
              <button ng-if="!u.is_admin" class="btn btn-xs btn-info" ng-click="set_admin(u.email, true)">Make admin</button>
              <button ng-if="u.is_admin && u.email !== current_user.email" class="btn btn-xs btn-default" ng-click="set_admin(u.email, false)">Remove admin</button>
              <button class="btn btn-xs btn-primary" ng-click="prompt_add_group(u.email)">+ Group</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</body>
</html>
