<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IVRE</title>
  </head>
  <body>
    <div id="root"></div>
    <!--
      Legacy backend endpoint that emits ``var config = { … }`` — the
      same script tag is used by the legacy AngularJS UI and lets us
      keep one source of truth for client-visible configuration.
      Loaded BEFORE the React entry so window.config is populated by
      the time any component renders.
    -->
    <script src="/cgi/config"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
